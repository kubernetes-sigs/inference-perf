apiVersion: batch/v1
kind: Job
metadata:
  name: inference-perf
  namespace: test-ns
spec:
  template:
    spec:
      containers:
        - name: inference-perf
          image: <some-registry>/inference-perf:slabe-multimodal
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              inference-perf --config_file /etc/config/config.yml --log-level DEBUG
              echo "=== START_SUMMARY ==="
              cat reports-*/summary_lifecycle_metrics.json
              echo "=== END_SUMMARY ==="
              echo "=== START_STAGE_0 ==="
              cat reports-*/stage_0_lifecycle_metrics.json
              echo "=== END_STAGE_0 ==="
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: hf_api_token
                  optional: true
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
      restartPolicy: Never
      volumes:
        - name: config-volume
          configMap:
            name: inference-perf-config
