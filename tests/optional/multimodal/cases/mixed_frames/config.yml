api:
  type: chat
  streaming: true
server:
  type: vllm
  model_name: Qwen/Qwen3-VL-8B-Instruct
  base_url: http://qwen3-32b-vllm-service:8000
data:
  type: synthetic
  input_distribution: { type: fixed, min: 32, max: 32, mean: 32 }
  output_distribution: { type: fixed, min: 16, max: 16, mean: 16 }
  multimodal:
    image:
      count: { type: fixed, min: 1, max: 1, mean: 1 }
      insertion_point: 0.0
      resolutions:
        - resolution: "1080p"
          weight: 1.0
    video:
      count: { type: fixed, min: 1, max: 1, mean: 1 }
      insertion_point: 1.0
      # Frames-as-images representation: each video expands to N PNG image_url
      # blocks at one insertion point. Verifies the FRAMES path against a real
      # model server (no MP4-decode dependency). Switch to ``jpeg_frames`` to
      # exercise JPEG-encoded frame batches (matches Meta's video pipeline).
      representation: png_frames
      profiles:
        - profile: { resolution: "720p", frames: 32 }
          weight: 1.0
load:
  type: constant
  stages:
    - rate: 1
      duration: 10
  num_workers: 1
report:
  request_lifecycle:
    summary: true
    per_stage: true
