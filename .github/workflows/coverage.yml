name: Code Coverage

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths-ignore:
      - '**/*.md'
  pull_request:

permissions:
  contents: read

jobs:
  format-check:
    runs-on: ubuntu-latest
    # contents: write is only needed to push the badge to the 'badges' branch,
    # which happens solely on push to main (see the publish step's condition).
    permissions:
      contents: write
    strategy:
      matrix:
        python-version: ['3.13']
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # Important: need full history to checkout 'main'
      # The workflow runs on every PR (no paths filter) so the Merge Gate
      # workflow always sees a completed Code Coverage run, but coverage
      # itself is skipped as a no-op when only markdown files changed.
      - name: Check for non-markdown changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -qv '\.md$'; then
              echo "code=true" >> "$GITHUB_OUTPUT"
            else
              echo "code=false" >> "$GITHUB_OUTPUT"
              echo "Only markdown files changed; skipping coverage."
            fi
          else
            echo "code=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Python
        if: steps.changes.outputs.code == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up PDM
        if: steps.changes.outputs.code == 'true'
        uses: pdm-project/setup-pdm@c6081998a653693a457d93c70b8007d979bc6741 # v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        if: steps.changes.outputs.code == 'true'
        run: |
          pdm sync -d -G analysis -G otel
      - name: Run Validation
        if: steps.changes.outputs.code == 'true'
        run: pdm run check:cov
      - name: Upload coverage reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-reports
          path: |
            coverage.json
            coverage.xml
            coverage-endpoint.json
          if-no-files-found: warn
      - name: Publish coverage badge to badges branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp coverage-endpoint.json /tmp/coverage-endpoint.json
          # Use an isolated worktree on an orphan 'badges' branch so we never
          # touch the checked-out source tree. The README points shields.io at
          # this JSON; shields renders the badge and GitHub camo-proxies it.
          git fetch origin badges --depth=1 || true
          if git show-ref --verify --quiet refs/remotes/origin/badges; then
            git worktree add /tmp/badges origin/badges
          else
            git worktree add --orphan -b badges /tmp/badges
          fi
          cp /tmp/coverage-endpoint.json /tmp/badges/coverage-endpoint.json
          cd /tmp/badges
          git add coverage-endpoint.json
          if git diff --staged --quiet; then
            echo "Badge unchanged; nothing to publish."
          else
            git commit -m "Update coverage badge"
            git push origin HEAD:badges
          fi
