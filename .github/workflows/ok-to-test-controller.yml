# Controller for the /ok-to-test command.
#
# Listens for "/ok-to-test" comments on pull requests. If (and only if) the
# commenter is on the authorized list below, it resolves the PR's head branch
# and head commit SHA via the GitHub API and dispatches integration-tests.yml
# pinned to that exact SHA.
#
# Security model:
#   - issue_comment always runs in the context of the DEFAULT branch, so this
#     file (including the authorized-user list) cannot be tampered with from a
#     PR branch.
#   - Untrusted text (comment body, usernames) is only ever passed to bash via
#     environment variables, never interpolated into the script — this
#     prevents shell/script injection from crafted comments.
#   - The dispatched run is pinned to the head SHA that was current when the
#     authorized user commented. If more commits are pushed afterwards, the
#     test run refuses to proceed and a fresh /ok-to-test is required.
name: ok-to-test controller

on:
  issue_comment:
    types: [created]

permissions:
  actions: write        # dispatch integration-tests.yml
  pull-requests: read   # read PR head ref / SHA
  issues: write         # add a reaction to the triggering comment

jobs:
  authorize-and-dispatch:
    # issue_comment fires for both issues and PRs; `issue.pull_request` is only
    # present when the comment is on a PR. The contains() check is a cheap
    # prefilter — the exact-match check happens in the first step.
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/ok-to-test')
    runs-on: ubuntu-latest
    steps:
      - name: Check command and commenter authorization
        id: auth
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENTER: ${{ github.event.comment.user.login }}
        run: |
          set -euo pipefail

          # Exact-match check: the comment must be exactly "/ok-to-test"
          # (surrounding whitespace tolerated), not merely mention it.
          if [[ "$(tr -d '[:space:]' <<<"$COMMENT_BODY")" != "/ok-to-test" ]]; then
            echo "Comment is not exactly '/ok-to-test'; ignoring."
            echo "authorized=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Authorized users, from OWNERS aliases:
          #   inference-perf-maintainers: achandrasekar wangchen615 SachinVarghese jjk-g lenadankin
          #   inference-perf-approvers:   alonh
          #   inference-perf-reviewers:   Bslabe123 alonh
          ALLOWED_USERS=(
            achandrasekar
            wangchen615
            SachinVarghese
            jjk-g
            lenadankin
            alonh
            Bslabe123
          )

          authorized=false
          for user in "${ALLOWED_USERS[@]}"; do
            # GitHub usernames are case-insensitive; compare lowercased.
            if [[ "${COMMENTER,,}" == "${user,,}" ]]; then
              authorized=true
              break
            fi
          done

          if [[ "$authorized" == "true" ]]; then
            echo "User '$COMMENTER' is authorized to trigger integration tests."
          else
            echo "User '$COMMENTER' is NOT authorized to trigger integration tests; ignoring."
          fi
          echo "authorized=$authorized" >> "$GITHUB_OUTPUT"

      - name: Fetch PR head branch and SHA
        if: steps.auth.outputs.authorized == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          # issue_comment carries no PR context (it runs against the default
          # branch), so resolve the PR's head branch and SHA via the API.
          PR_JSON="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}")"

          HEAD_REF="$(jq -r '.head.ref' <<<"$PR_JSON")"
          HEAD_SHA="$(jq -r '.head.sha' <<<"$PR_JSON")"
          HEAD_REPO="$(jq -r '.head.repo.full_name' <<<"$PR_JSON")"

          # workflow_dispatch needs a ref that exists in THIS repository and
          # contains the integration-tests.yml workflow file. For same-repo
          # PRs that is the head branch itself; for PRs from forks the head
          # branch does not exist here, so dispatch on the default branch —
          # the test workflow checks out the PR code via the head SHA anyway.
          if [[ "$HEAD_REPO" == "$REPO" ]]; then
            DISPATCH_REF="$HEAD_REF"
          else
            DISPATCH_REF="$DEFAULT_BRANCH"
          fi

          echo "PR #${PR_NUMBER}: head_ref=${HEAD_REF} head_sha=${HEAD_SHA} head_repo=${HEAD_REPO} dispatch_ref=${DISPATCH_REF}"
          {
            echo "head_ref=$HEAD_REF"
            echo "head_sha=$HEAD_SHA"
            echo "dispatch_ref=$DISPATCH_REF"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch integration tests
        if: steps.auth.outputs.authorized == 'true'
        env:
          # The default GITHUB_TOKEN works here: workflow_dispatch and
          # repository_dispatch are exempt from GitHub's recursive-trigger
          # prevention. Set the OK_TO_TEST_TOKEN secret (fine-grained PAT or
          # GitHub App token) only if you need cross-repo dispatch or want the
          # dispatched run attributed to a bot identity.
          GH_TOKEN: ${{ secrets.OK_TO_TEST_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          DISPATCH_REF: ${{ steps.pr.outputs.dispatch_ref }}
        run: |
          set -euo pipefail
          gh workflow run integration-tests.yml \
            --repo "$REPO" \
            --ref "$DISPATCH_REF" \
            -f "pr_number=$PR_NUMBER" \
            -f "head_sha=$HEAD_SHA"
          echo "Dispatched integration-tests.yml on ref '$DISPATCH_REF' for PR #${PR_NUMBER} @ ${HEAD_SHA}"

      - name: Acknowledge the command with a reaction
        if: steps.auth.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          set -euo pipefail
          gh api --method POST \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -f content=rocket
