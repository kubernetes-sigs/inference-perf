{{- if .Values.worker.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inference-perf.fullname" . }}-worker
  labels:
    {{- include "inference-perf.labels" . | nindent 4 }}
    app: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "inference-perf.selectorLabels" . | nindent 6 }}
      app: worker
  template:
    metadata:
      labels:
        {{- include "inference-perf.selectorLabels" . | nindent 8 }}
        app: worker
    spec:
      containers:
      - name: worker
        image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
        imagePullPolicy: Always
        command: ["inference-perf"]
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        args:
          - "--config_file"
          - "{{ include "inference-perf.configMount" . }}/config.yml"
          - "--mode"
          - "worker"
          - "--worker-id"
          - "$(POD_NAME)"
          - "--redis-host"
          - "{{ include "inference-perf.fullname" . }}-redis"
          - "--redis-port"
          - "6379"
          - "--log-level"
          - {{ .Values.logLevel }}
        volumeMounts:
        - name: config-volume
          mountPath: {{ include "inference-perf.configMount" . }}
          readOnly: true
      volumes:
      - name: config-volume
        configMap:
          name: {{ include "inference-perf.fullname" . }}-config
{{- end }}
