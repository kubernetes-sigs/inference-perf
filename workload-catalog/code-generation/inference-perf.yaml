load:
  type: concurrent
  stages:
  - num_requests: 120
    concurrency_level: 4
  - num_requests: 120
    concurrency_level: 8
  - num_requests: 120
    concurrency_level: 12
  - num_requests: 120
    concurrency_level: 16
  - num_requests: 120
    concurrency_level: 20
  num_workers: 1
api:
  type: completion
  streaming: true
server:
  type: vllm
  model_name: google/gemma-3-1b-it
  base_url: http://localhost:8000
data:
  type: conversation_replay
  conversation_replay:
    seed: 42
    num_conversations: 20
    shared_system_prompt_len: 3000
    dynamic_system_prompt_len:
      type: lognormal
      min: 10000
      max: 990000
      mean: 160000
      std_dev: 233600
    turns_per_conversation:
      type: lognormal
      min: 1
      max: 3000
      mean: 540
      std_dev: 48600
    input_tokens_per_turn:
      type: lognormal
      min: 100
      max: 10000
      mean: 1500
      std_dev: 1200
    output_tokens_per_turn:
      type: lognormal
      min: 50
      max: 10000
      mean: 425
      std_dev: 825
    tool_call_latency_sec:
      type: lognormal
      min: 1
      max: 1000
      mean: 15
      std_dev: 55
