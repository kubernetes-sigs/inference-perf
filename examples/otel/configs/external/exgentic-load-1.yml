api:
  type: chat
  streaming: false

data:
  type: otel_trace_replay
  otel_trace_replay:
    hf_dataset_path: "lenadan/otel-test-snippet-jsonl"

    # Model configuration
    use_static_model: true
    static_model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"

    # Request settings
    default_max_tokens: 50

    include_errors: false
    skip_invalid_files: true


load:
  type: trace_session_replay
  stages:
    - concurrent_sessions: 20
  worker_max_concurrency: 10000
  base_seed: 42

server:
  type: vllm
  base_url: "http://localhost:8000"
  model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"

storage:
  local_storage:
    path: "reports-exgentic-load-1"

report:
  request_lifecycle:
    summary: true
    per_stage: true
    per_request: false
  