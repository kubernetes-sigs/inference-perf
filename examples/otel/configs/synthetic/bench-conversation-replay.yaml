# Conversation replay benchmark using synthetic OTel traces.
#
# Traces are pre-generated at Docker build time from tools/default_trace_config.yaml.
# No manual generation step needed — just fill in the placeholders and run.
#
# Usage:
#   1. Generate traces (if not using the Docker image with baked-in traces):
#      python tools/generate_synthetic_traces.py \
#        --config examples/otel/configs/synthetic/synthetic_trace_config.yaml
#
#   2. Fill placeholders and run:
#      inference-perf --config_file bench-conversation-replay.yaml

data:
  type: otel_trace_replay
  otel_trace_replay:
    trace_directory: ./synthetic_traces/
    use_static_model: true
    static_model_name: __MODEL__
    default_max_tokens: 1000
    skip_invalid_files: true

load:
  type: trace_session_replay
  stages:
    - concurrent_sessions: 10
      num_sessions: 100
    - concurrent_sessions: 25
      num_sessions: 100
    - concurrent_sessions: 50
      num_sessions: 100
    - concurrent_sessions: 100
      num_sessions: 100
    - concurrent_sessions: 200
      num_sessions: 100
  num_workers: 8
  worker_max_concurrency: 400

api:
  type: chat
  streaming: true

server:
  type: vllm
  model_name: __MODEL__
  base_url: __ENDPOINT__
  api_key: __API_KEY__

tokenizer:
  pretrained_model_name_or_path: Qwen/Qwen3-14B

report:
  request_lifecycle:
    summary: true
    per_stage: true
    per_request: false
