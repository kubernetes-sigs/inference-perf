load:
  type: constant
  interval: 15
  sweep:                   # inference-perf finds the saturation rate (mu_max) on its own, then places stages by utilization around it
    type: geometric         # geometric|linear spacing (geometric concentrates resolution at the knee)
    num_stages: 10          # Number of stages to generate
    stage_duration: 60      # Duration (s) of each generated stage
api:
  type: completion
server:
  type: vllm
  base_url: http://0.0.0.0:8000
data:
  type: shareGPT
metrics:
  type: prometheus
  prometheus:
    url: http://localhost:9090
    scrape_interval: 15
report:
  request_lifecycle:
    summary: true
    per_stage: true
    per_request: true
