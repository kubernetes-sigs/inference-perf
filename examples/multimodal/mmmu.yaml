# MMMU real-dataset benchmark. Streams the gated HuggingFace MMMU dataset
# (https://huggingface.co/datasets/MMMU/MMMU) and emits chat-completion
# requests with the question + options as text and the embedded images as
# ``image_url`` blocks.
#
# MMMU (Massive Multi-discipline Multimodal Understanding) is a college-level
# VLM evaluation benchmark spanning 30 subjects across 6 disciplines (art,
# science, engineering, etc.). Examples carry 1-7 images each — useful for
# document- and diagram-heavy VLM workloads that the synthetic path doesn't
# exercise well.
#
# The full dataset is small enough to fit in memory; init loads all configured
# subjects synchronously. Pin to a single subject for fast iteration, or remove
# ``subjects:`` to load all 30 (slower init, broader coverage).
#
# Requires: HF_TOKEN with access to the gated dataset.

api:
  type: chat
  streaming: true

server:
  type: vllm
  model_name: Qwen/Qwen3-VL-8B-Instruct
  base_url: http://localhost:8000

tokenizer:
  pretrained_model_name_or_path: Qwen/Qwen3-VL-8B-Instruct

data:
  type: mmmu
  mmmu:
    # subjects: ["Computer_Science"]  # default: all 30 subjects
    representation: png                # png (lossless, default) | jpeg
    # target_resolution: "720p"        # default: source resolution
    max_images_per_request: 4
    insertion_point: 0.0
    hf_split: validation               # dev | validation | test

load:
  type: constant
  stages:
    - rate: 1.0
      duration: 60
  num_workers: 1

report:
  request_lifecycle:
    summary: true
    per_stage: true
